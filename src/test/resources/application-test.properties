# Datasource H2 em modo compatibilidade PostgreSQL
spring.datasource.url=jdbc:h2:mem:aque_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# Flyway ? desabilita no H2 (DDL gerenciado pelo Hibernate em testes)
spring.flyway.enabled=false
# JWT (valor fixo para testes)
app.jwt.secret=test-secret-key-for-unit-tests-only-minimum-256-bits-long
app.jwt.expiration-ms=3600000